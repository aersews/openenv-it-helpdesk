spec_version: 1
name: helpdesk_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: "task_easy"
    name: "easy-laptop-slow"
    description: "Resolve slow laptop by assigning to hardware_support team"
    grader: true
    reset_args:
      scenario: "easy"
    max_episode_steps: 10
  - id: "task_medium"
    name: "medium-account-locked"
    description: "Unlock johndoe account using diagnostic and restart_service"
    grader: true
    reset_args:
      scenario: "medium"
    max_episode_steps: 12
  - id: "task_hard"
    name: "hard-website-down"
    description: "Diagnose and restart database to fix website outage"
    grader: true
    reset_args:
      scenario: "hard"
    max_episode_steps: 15

evaluation:
  grader_endpoint: "/grader"
  tasks_endpoint: "/tasks"
  min_tasks_with_graders: 3
